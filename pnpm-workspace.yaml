packages:
  - 'packages/*'
  - 'examples/*'

# Single source of truth for shared tooling versions — every package.json references these
# as "catalog:". Bump here once; pnpm applies it everywhere.
#
# TypeScript = DUAL-COMPILER (see ENGINEERING-STANDARDS, "Adopting a new language version…"):
#   the primary `typescript` is pinned to TS 6.0 — the newest STABLE the type-aware lint stack
#   supports (typescript-eslint peers `typescript <6.1.0`). The native TS 7 runs as a forward-compat
#   `--noEmit` gate via the `typescript-next` alias in the root package.json (`typecheck:next`, folded
#   into `typecheck`). Collapse to TS 7 primary once typescript-eslint supports it — see the roadmap.
#   @types/node stays on 22 to match the Node 22 build target (engines: >=22; Node 20 is EOL).
catalog:
  typescript: ~7.0.2
  tsup: ^8.5.1
  vite: ^8.1.5
  vitest: ^4.1.10
  '@vitest/coverage-v8': ^4.1.10
  '@types/node': ^26.1.1
  eslint: ^10.7.0
  '@eslint/js': ^10.0.1
  typescript-eslint: ^8.65.0
  prettier: ^3.9.6
  dependency-cruiser: ^18.1.0
  turbo: ^2.10.5
  '@changesets/cli': ^2.31.1
  husky: ^9.1.7
  lint-staged: ^17.1.0
